project_name: rice_disease_multimodal

model:
  image_encoder: efficientnet_b0
  text_encoder: phobert
  num_classes: 4
  fusion: cross_attention

dataset:
  num_classes: 4
  classes:
    - BrownSpot
    - Healthy
    - Hispa
    - LeafBlast

data:
  train_metadata: dataset/splits/train.json
  val_metadata: dataset/splits/val.json
  test_metadata: dataset/splits/test.json
  image_size: 224
  max_length: 128
  num_workers: 4

training:
  seed: 42
  batch_size: 16
  epochs: 30
  lr: 0.0001  # Quan trọng: phải là số, không phải string "1e-4"
  weight_decay: 0.0001  # Cũng nên là số
  grad_clip_norm: 1.0
  patience: 4

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score

outputs:
  checkpoints: outputs/checkpoints
  figures: outputs/figures
  metrics: outputs/metrics
  logs: outputs/logs